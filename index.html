<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramais OAB SP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f7f8fc;--surface:#fff;--border:#e4e7ef;--border2:#d0d5e2;
  --text:#0f1523;--text2:#4a5568;--text3:#8492a6;
  --blue:#0066ff;--blue-light:#e8f0fe;--blue-mid:#c2d7fd;
  --green:#00875a;--green-light:#e3fcef;
  --ff:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:8px;--rs:6px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 12px rgba(0,0,0,.10);
}
html,body{min-height:100%;font-family:var(--ff);background:var(--bg);color:var(--text);font-size:14px}

/* TOPBAR */
#topbar{
  position:sticky;top:0;z-index:50;
  height:56px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:14px;
  box-shadow:0 1px 0 var(--border);
}
.tb-icon{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-icon svg{width:18px;height:18px;stroke:#fff;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.tb-title{font-size:15px;font-weight:700;letter-spacing:-.3px}
.tb-tag{font-size:10px;font-weight:700;background:var(--blue-light);color:var(--blue);padding:3px 8px;border-radius:4px;letter-spacing:.4px}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:10px}

/* SEARCH */
.search-wrap{position:relative;width:280px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text3);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
#search{
  width:100%;border:1.5px solid var(--border);border-radius:var(--rs);
  padding:8px 10px 8px 32px;font-family:var(--ff);font-size:13px;
  color:var(--text);outline:none;background:var(--bg);transition:border-color .15s
}
#search:focus{border-color:var(--blue);background:var(--surface)}
#search::placeholder{color:var(--text3)}
#result-count{font-size:12px;color:var(--text3);white-space:nowrap;font-variant-numeric:tabular-nums}

/* COPY TOAST */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--text);border-radius:var(--rs);padding:9px 18px;
  font-size:13px;font-weight:600;color:#fff;opacity:0;
  transition:all .2s;pointer-events:none;z-index:300;white-space:nowrap;
  box-shadow:var(--sh2)
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MAIN */
#main{padding:20px 24px 40px;max-width:1200px;margin:0 auto}

/* SECTOR GRID */
.sectors-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:12px
}

/* SECTOR CARD */
.sector-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);
  transition:box-shadow .15s
}
.sector-card:hover{box-shadow:var(--sh2)}
.sector-card.hidden{display:none}

.sec-hd{
  padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;cursor:pointer;
  user-select:none;background:var(--surface)
}
.sec-hd:hover{background:var(--bg)}
.sec-icon{
  width:30px;height:30px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0
}
.sec-name{font-size:13px;font-weight:700;color:var(--text);flex:1}
.sec-count{
  font-size:10px;font-weight:700;color:var(--text3);
  background:var(--bg);border:1px solid var(--border);
  padding:2px 7px;border-radius:20px;font-variant-numeric:tabular-nums
}
.sec-chevron{
  width:16px;height:16px;stroke:var(--text3);stroke-width:2;
  fill:none;stroke-linecap:round;stroke-linejoin:round;
  transition:transform .2s;flex-shrink:0
}
.sector-card.open .sec-chevron{transform:rotate(90deg)}

.sec-body{display:none;padding:8px 12px 10px}
.sector-card.open .sec-body{display:block}

/* RAMAL LIST */
.ramal-list{display:flex;flex-direction:column;gap:2px}
.ramal-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 8px;border-radius:var(--rs);
  transition:background .1s;cursor:default
}
.ramal-row:hover{background:var(--bg)}
.ramal-row.highlight{background:var(--blue-light)}
.ramal-num{
  font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text);
  letter-spacing:.5px
}
.ramal-row.highlight .ramal-num{color:var(--blue);font-weight:700}
.copy-btn{
  width:26px;height:26px;border-radius:5px;border:none;cursor:pointer;
  background:transparent;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:all .15s;flex-shrink:0
}
.ramal-row:hover .copy-btn{opacity:1;background:var(--border)}
.copy-btn:hover{background:var(--blue-mid) !important}
.copy-btn svg{width:13px;height:13px;stroke:var(--text2);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.copy-btn:hover svg{stroke:var(--blue)}
.copy-btn.copied{opacity:1;background:var(--green-light) !important}
.copy-btn.copied svg{stroke:var(--green)}

/* EMPTY */
.empty{
  grid-column:1/-1;text-align:center;padding:60px 20px;
  font-size:14px;color:var(--text3);display:none
}
.empty svg{width:40px;height:40px;stroke:var(--border2);stroke-width:1.5;fill:none;margin:0 auto 12px;display:block}
</style>
</head>
<body>

var ICONS = {
  "AJ":"⚖","Almoxarifado":"📦","Biblioteca":"📚","Cadastro":"🗂",
  "Câmaras Recursais":"🏛","Central":"📞","Controladoria":"📊","COPA - SÉ":"☕",
  "Corregedoria TED":"🔍","Cultural":"🎭","DASI":"💻","Depto. de Subseções":"🏢",
  "DGI (SGQ)":"📋","Engenharia":"🔧","ESA":"🎓","Escola de Prerrogativas":"📖",
  "Exame":"📝","Financeiro":"💰","Força Tarefa":"🚨","Gabinete dos TEDs":"👥",
  "HELPDESK":"🖥","Inscrições":"✍","Logística":"🚚","Microfilmagem":"📷",
  "Núcleos":"🔵","Ouvidoria":"📣","Pós-Graduação":"🎓","Prerrogativas":"⚡",
  "Presidente - TED II":"👔","Presidente - TED IV":"👔","Presidente - TED VI":"👔",
  "Protocolo":"📬","Recepção Largo da Pólvora":"🚪","Recepção MP88 - 01":"🚪",
  "Recepção MP88 - 02":"🚪","Resgate":"🆘","RH":"👥","SINAD":"🔗"
};

var COLORS = [
  '#e8f0fe','#e3fcef','#fff3cd','#fce8e6','#f3e8ff','#e8f5e9',
  '#e3f2fd','#fff8e1','#fce4ec','#e8eaf6','#e0f2f1','#f3e5f5'
];
var colorIdx = 0;
var sectorColors = {};

function getColor(name) {
  if (!sectorColors[name]) {
    sectorColors[name] = COLORS[colorIdx % COLORS.length];
    colorIdx++;
  }
  return sectorColors[name];
}

function renderAll() {
  var grid = document.getElementById('grid');
  var html = '';
  var total = 0;
  Object.keys(DATA).sort().forEach(function(name) {
    var nums = DATA[name];
    total += nums;
    var color = getColor(name);
    var icon = ICONS[name] || '📞';
    html += '<div class="sector-card" id="card-'+encodeURIComponent(name)+'" data-sector="'+name.toLowerCase()+'">'
      +'<div class="sec-hd" onclick="toggle(this.parentNode)">'
      +'<div class="sec-icon" style="background:'+color+'">'+icon+'</div>'
      +'<div class="sec-name">'+name+'</div>'
      +'<span class="sec-count">'+nums.length+'</span>'
      +'<svg class="sec-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>'
      +'</div>'
      +'<div class="sec-body"><div class="ramal-list">'
      +nums.map(function(n){
        return '<div class="ramal-row" data-num="'+n.toLowerCase()+'">'
          +'<span class="ramal-num">'+n+'</span>'
          +'<button class="copy-btn" onclick="copiar(this,\''+n+'\')" title="Copiar">'
          +'<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'
          +'</button>'
          +'</div>';
      }).join('')
      +'</div></div></div>';
  });
  grid.innerHTML = html;
  updateCount(Object.keys(DATA).length);
}

function toggle(card) {
  card.classList.toggle('open');
}

function copiar(btn, num) {
  navigator.clipboard.writeText(num).then(function() {
    btn.classList.add('copied');
    setTimeout(function(){ btn.classList.remove('copied'); }, 1500);
    toast('Copiado: ' + num);
  });
}

var _tt;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(function(){ el.classList.remove('show'); }, 2000);
}

function updateCount(n) {
  var total = 0;
  Object.keys(DATA).forEach(function(k){ total += DATA[k].length; });
  document.getElementById('result-count').textContent = n > 0 ? n + ' setores' : 'Nenhum resultado';
}

function filtrar(term) {
  term = (term || '').toLowerCase().trim();
  var cards = document.querySelectorAll('.sector-card');
  var visible = 0;

  cards.forEach(function(card) {
    var sector = card.getAttribute('data-sector');
    var rows = card.querySelectorAll('.ramal-row');
    var sectorMatch = !term || sector.indexOf(term) >= 0;
    var anyNum = false;

    rows.forEach(function(row) {
      var num = row.getAttribute('data-num');
      var match = !term || sectorMatch || num.indexOf(term) >= 0;
      row.classList.toggle('hidden-row', !match);
      row.classList.toggle('highlight', !!term && match && !sectorMatch);
      if (match) anyNum = true;
    });

    var show = !term || sectorMatch || anyNum;
    card.classList.toggle('hidden', !show);
    if (show) {
      visible++;
      if (term) card.classList.add('open');
      else if (!sectorMatch) card.classList.add('open');
    }
  });

  document.getElementById('empty').style.display = visible === 0 ? 'block' : 'none';
  document.getElementById('empty-term').textContent = term;
  updateCount(visible);
}

renderAll();
</script>
